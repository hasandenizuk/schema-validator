<!DOCTYPE html>
<html lang="en">
<head>
    <title>FAQ Page Example</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "What is structured data?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Structured data is a standardized format for providing information about a page and classifying the page content."
              }
            },
            {
              "@type": "Question",
              "name": "Why does schema markup matter for SEO?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Schema markup helps search engines understand your content and can result in rich snippets in search results, improving click-through rates."
              }
            }
          ]
        },
        {
          "@type": "WebPage",
          "name": "Frequently Asked Questions",
          "url": "https://example.com/faq"
        }
      ]
    }
    </script>
</head>
<body>
    <h1>Frequently Asked Questions</h1>
</body>
</html>
