<!DOCTYPE html>
<html lang="en">
<head>
    <title>Page With Schema Errors</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Article",
          "description": "This article is missing headline, datePublished, and author."
        },
        {
          "@type": "FAQPage"
        },
        {
          "@type": "Product",
          "description": "A product without a name, brand, or offers."
        },
        {
          "@type": "BreadcrumbList",
          "itemListElement": []
        }
      ]
    }
    </script>
</head>
<body>
    <h1>This page has intentional schema errors for testing</h1>
</body>
</html>
