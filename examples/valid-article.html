<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sample Article Page</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Article",
          "headline": "How to Optimize Your Schema Markup",
          "datePublished": "2026-01-15",
          "dateModified": "2026-03-10",
          "author": {
            "@type": "Person",
            "name": "Jane Smith"
          },
          "publisher": {
            "@type": "Organization",
            "name": "Example Corp",
            "logo": {
              "@type": "ImageObject",
              "url": "https://example.com/logo.png"
            }
          },
          "image": "https://example.com/article-image.jpg",
          "description": "A guide to getting your structured data right for Google Rich Results."
        },
        {
          "@type": "BreadcrumbList",
          "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://example.com" },
            { "@type": "ListItem", "position": 2, "name": "Blog", "item": "https://example.com/blog" },
            { "@type": "ListItem", "position": 3, "name": "Schema Markup Guide" }
          ]
        },
        {
          "@type": "WebPage",
          "name": "Schema Markup Guide",
          "url": "https://example.com/blog/schema-guide"
        }
      ]
    }
    </script>
</head>
<body>
    <h1>How to Optimize Your Schema Markup</h1>
    <p>Content goes here...</p>
</body>
</html>
